runtime:
  # Relative paths are resolved from this configs directory.
  # Effective priority: explicit --home/project_root argument > this yml > env vars > ./runtime.
  project_root: ../runtime
  local_job_workers: 2

database:
  # Relative database paths are resolved under runtime.project_root.
  path: zj_forecast.db
  url:

nwp:
  # NWP NetCDF extraction is parallelized by issue file.
  # loky is process-based and safer for NetCDF/HDF5 I/O than Python threads.
  workers: 4
  parallel_backend: loky
  # Request data_paths.nwp_root has the highest business priority for a task.
  # If it is omitted, tasks use the station-type root below.
  default_root:
  roots:
    wind: /mnt/d/data/netcdf/ecmwf/jiangsu
    solar: /mnt/d/data/netcdf/ecmwf/neimeng

region_grid:
  # Region tasks use the Zhejiang city/province bounds in core/regions.py.
  # The bbox is expanded by margin_deg on each side, converted to a square
  # center cutout, and rounded up so H == W and grid_size is divisible by
  # swin_grid_multiple for Swin/Swin3D patch/merge stages.
  margin_deg: 0.5
  resolution_deg: 0.25
  swin_grid_multiple: 8
  min_grid_size: 16
